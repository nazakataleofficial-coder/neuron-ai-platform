<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.includes('Cannot set property fetch')) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.includes('Cannot set property fetch')) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);
    </script>
    <title>Build The Future With AI</title>
  </head>
  <body class="bg-[#05070D] text-white font-sans antialiased selection:bg-blue-500/30">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
